<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1e293b" />
  <title>MAKEN METAL - Transferencias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    * { touch-action: manipulation; }
    input, select, textarea { font-size: 16px !important; }
    button { min-height: 44px; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    const ALMACENES_DEFAULT = ['01 MATERIA PRIMA', '02 PROCESO DE MAQUINADO', '03 PROCESO EXTERNO', '04 PROCESO DE ACABADO', '05 ENSAMBLES', '06 PRODUCTO TERMINADO', '10 SCRAP'];
    const SKUS_DEMO = [{ codigo: 'DEMO-001', descripcion: 'Demo (conecta al Sheet)' }];
    const PROVEEDORES_DEMO = ['Demo'];
    const EMPLEADOS_DEMO = [{ numero: '1234', nombre: 'Demo' }];
    const PIN_ADMIN = '9473';
    const MAX_HISTORIAL = 10;

    // URL del Google Apps Script - hardcodeada para que funcione en cualquier celular sin configuración
    const APPS_SCRIPT_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbwqK_c83G_CsDw0MQHrBV2lDo0n0-1rcHllPbuqHoBrOXlUmIf3Wj9OxQ4nKn3fkeQ/exec';

    // Iconos
    const Icon = ({ d, size = 18, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const IconPackage = (p) => <Icon {...p} d={<><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></>} />;
    const IconSend = (p) => <Icon {...p} d={<><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></>} />;
    const IconLogIn = (p) => <Icon {...p} d={<><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></>} />;
    const IconLogOut = (p) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>} />;
    const IconSettings = (p) => <Icon {...p} d={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />;
    const IconRefresh = (p) => <Icon {...p} d={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />;
    const IconCheck = (p) => <Icon {...p} d={<><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></>} />;
    const IconClock = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
    const IconAlert = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>} />;
    const IconCloud = (p) => <Icon {...p} d={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 0 1 0 9Z"/>} />;
    const IconCloudOff = (p) => <Icon {...p} d={<><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.07"/></>} />;
    const IconPlus = (p) => <Icon {...p} d={<><path d="M5 12h14"/><path d="M12 5v14"/></>} />;
    const IconTrash = (p) => <Icon {...p} d={<><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />;
    const IconFlame = (p) => <Icon {...p} d={<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>} />;
    const IconArrow = (p) => <Icon {...p} d={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
    const IconBack = (p) => <Icon {...p} d={<><path d="m15 18-6-6 6-6"/></>} />;
    const IconSearch = (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;

    const storage = {
      get: (k) => { try { return localStorage.getItem('mkm_' + k); } catch (e) { return null; } },
      set: (k, v) => { try { localStorage.setItem('mkm_' + k, v); return true; } catch (e) { return false; } },
    };

    function App() {
      const [pantalla, setPantalla] = useState('login');
      const [empleadoNum, setEmpleadoNum] = useState('');
      const [empleadoNombre, setEmpleadoNombre] = useState('');
      const [empleadoInput, setEmpleadoInput] = useState('');
      const [pinInput, setPinInput] = useState('');

      const [solicitudes, setSolicitudes] = useState([]);
      const [skus, setSkus] = useState(SKUS_DEMO);
      const [almacenes, setAlmacenes] = useState(ALMACENES_DEFAULT);
      const [proveedores, setProveedores] = useState(PROVEEDORES_DEMO);
      const [empleados, setEmpleados] = useState(EMPLEADOS_DEMO);

      const [configUrl, setConfigUrl] = useState('');
      const [catalogosOnline, setCatalogosOnline] = useState(false);
      const [loading, setLoading] = useState(true);
      const [sincronizando, setSincronizando] = useState(false);
      const [actualizandoEstados, setActualizandoEstados] = useState(false);
      const [mensaje, setMensaje] = useState(null);

      // Formulario (cabecera)
      const [origen, setOrigen] = useState('');
      const [destino, setDestino] = useState('');
      const [proveedorSel, setProveedorSel] = useState('');
      const [proveedorLibre, setProveedorLibre] = useState('');
      const [urgencia, setUrgencia] = useState('NORMAL');
      const [comentarios, setComentarios] = useState('');
      const [partidas, setPartidas] = useState([]);
      const [enviando, setEnviando] = useState(false);

      // Pantalla búsqueda de SKU (pantalla completa)
      const [skuBusqueda, setSkuBusqueda] = useState('');
      const [skuSeleccionado, setSkuSeleccionado] = useState(null);
      const [cantidadPartida, setCantidadPartida] = useState('');
      const [saldoPartida, setSaldoPartida] = useState('');

      // Selectores modales
      const [modalAlmacen, setModalAlmacen] = useState(null); // 'origen' | 'destino' | null

      useEffect(() => { inicializar(); }, []);

      const inicializar = async () => {
        setLoading(true);
        // La URL ya viene hardcodeada. Permite override si admin la cambió vía config.
        const urlGuardada = storage.get('config_url');
        const url = urlGuardada && urlGuardada.trim() ? urlGuardada : APPS_SCRIPT_URL_DEFAULT;
        setConfigUrl(url);
        const sol = storage.get('solicitudes');
        if (sol) { try { setSolicitudes(JSON.parse(sol)); } catch (e) {} }
        if (url) await cargarCatalogosDelSheet(url);
        setLoading(false);
      };

      const cargarCatalogosDelSheet = async (url) => {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error('No se pudo leer Sheet');
          const data = await res.json();
          if (data.empleados?.length) {
            const m = data.empleados.filter(e => e.Numero).map(e => ({ numero: String(e.Numero).trim(), nombre: String(e.Nombre || '').trim() }));
            if (m.length) setEmpleados(m);
          }
          if (data.numerosParte?.length) {
            const m = data.numerosParte.filter(s => s.Codigo).map(s => ({ codigo: String(s.Codigo).trim(), descripcion: String(s.Descripcion || '').trim() }));
            if (m.length) setSkus(m);
          }
          if (data.proveedores?.length) {
            const m = data.proveedores.filter(p => p.Nombre).map(p => String(p.Nombre).trim());
            if (m.length) setProveedores(m);
          }
          if (data.almacenes?.length) {
            const m = data.almacenes.filter(a => a.Almacen).map(a => String(a.Almacen).trim());
            if (m.length) setAlmacenes(m);
          }
          setCatalogosOnline(true);
          return true;
        } catch (err) {
          setCatalogosOnline(false);
          return false;
        }
      };

      const sincronizarCatalogos = async () => {
        if (!configUrl) { mostrarMensaje('Configura la URL primero (PIN admin)', 'error'); return; }
        setSincronizando(true);
        const ok = await cargarCatalogosDelSheet(configUrl);
        setSincronizando(false);
        mostrarMensaje(ok ? '✓ Catálogos actualizados' : 'No se pudo conectar', ok ? 'ok' : 'error');
      };

      const actualizarEstados = async () => {
        if (!configUrl) { mostrarMensaje('Sin configuración', 'error'); return; }
        setActualizandoEstados(true);
        try {
          const res = await fetch(configUrl + '?action=estados');
          if (!res.ok) throw new Error('Error lectura');
          const data = await res.json();
          const estados = data.estados || {};
          const actualizadas = solicitudes.map(s => {
            const e = estados[s.folio];
            if (e) {
              return { ...s, procesado: e.procesado, fechaProcesado: e.fechaProcesado };
            }
            return s;
          });
          setSolicitudes(actualizadas);
          storage.set('solicitudes', JSON.stringify(actualizadas));
          mostrarMensaje('✓ Estados actualizados', 'ok');
        } catch (err) {
          mostrarMensaje('Error al actualizar estados', 'error');
        }
        setActualizandoEstados(false);
      };

      const mostrarMensaje = (texto, tipo = 'ok') => {
        setMensaje({ texto, tipo });
        setTimeout(() => setMensaje(null), 3500);
      };

      const handleLogin = () => {
        const num = empleadoInput.trim();
        if (!num) return mostrarMensaje('Ingresa tu número de empleado', 'error');
        const emp = empleados.find(e => e.numero === num);
        if (!emp) return mostrarMensaje('Número no registrado', 'error');
        setEmpleadoNum(emp.numero);
        setEmpleadoNombre(emp.nombre);
        setPantalla('solicitud');
      };

      const handleLogout = () => {
        setEmpleadoNum(''); setEmpleadoNombre(''); setEmpleadoInput('');
        setPantalla('login'); limpiarFormulario();
      };

      const limpiarFormulario = () => {
        setOrigen(''); setDestino(''); setProveedorSel(''); setProveedorLibre('');
        setUrgencia('NORMAL'); setComentarios(''); setPartidas([]);
        limpiarPartidaActual();
      };

      const limpiarPartidaActual = () => {
        setSkuBusqueda(''); setSkuSeleccionado(null);
        setCantidadPartida(''); setSaldoPartida('');
      };

      const generarFolio = () => {
        const year = new Date().getFullYear();
        return `SOL-${year}-${String(solicitudes.length + 1).padStart(4, '0')}`;
      };

      const agregarPartida = () => {
        if (!skuSeleccionado) return mostrarMensaje('Selecciona número de parte', 'error');
        if (!cantidadPartida || parseFloat(cantidadPartida) <= 0) return mostrarMensaje('Captura cantidad', 'error');
        if (saldoPartida === '' || parseFloat(saldoPartida) < 0) return mostrarMensaje('Captura saldo en origen', 'error');

        const nuevaPartida = {
          codigo: skuSeleccionado.codigo,
          descripcion: skuSeleccionado.descripcion,
          cantidad: parseFloat(cantidadPartida),
          saldoOrigen: parseFloat(saldoPartida),
        };
        setPartidas([...partidas, nuevaPartida]);
        limpiarPartidaActual();
        setPantalla('solicitud');
        mostrarMensaje('✓ Partida agregada', 'ok');
      };

      const eliminarPartida = (i) => {
        setPartidas(partidas.filter((_, idx) => idx !== i));
      };

      const handleEnviar = async () => {
        if (!origen) return mostrarMensaje('Selecciona almacén origen', 'error');
        if (!destino) return mostrarMensaje('Selecciona almacén destino', 'error');
        if (origen === destino) return mostrarMensaje('Origen y destino no pueden ser iguales', 'error');
        const esExterno = destino.toUpperCase().includes('PROCESO EXTERNO');
        if (esExterno && !proveedorSel && !proveedorLibre) return mostrarMensaje('Selecciona proveedor', 'error');
        if (partidas.length === 0) return mostrarMensaje('Agrega al menos una partida', 'error');

        setEnviando(true);
        const ahora = new Date();
        const fechaStr = ahora.toLocaleDateString('es-MX');
        const horaStr = ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        const proveedorFinal = esExterno ? (proveedorSel === '__otro__' ? proveedorLibre : proveedorSel) : '';

        const folio = generarFolio();
        const nueva = {
          folio, fechaHora: `${fechaStr} ${horaStr}`,
          timestamp: ahora.toISOString(),
          empleado: `${empleadoNum} - ${empleadoNombre}`,
          origen, destino,
          proveedorExterno: proveedorFinal,
          partidas,
          comentarios: comentarios.trim(),
          urgencia,
          procesado: false,
          fechaProcesado: '',
        };

        // Mantener solo últimas N
        const nuevas = [nueva, ...solicitudes].slice(0, MAX_HISTORIAL * 3); // guarda buffer por si varios usuarios
        setSolicitudes(nuevas);
        storage.set('solicitudes', JSON.stringify(nuevas));

        if (configUrl) {
          try {
            await fetch(configUrl, {
              method: 'POST', mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(nueva),
            });
            const msg = urgencia === 'URGENTE' ? `🔴 URGENTE ${folio} enviada` : `✓ ${folio} enviada`;
            mostrarMensaje(msg, 'ok');
          } catch (e) {
            mostrarMensaje(`Guardada local, error al enviar`, 'warn');
          }
        } else {
          mostrarMensaje(`${folio} guardada (offline)`, 'warn');
        }
        limpiarFormulario();
        setPantalla('mis_solicitudes');
        setEnviando(false);
      };

      const skusFiltrados = skus.filter(s =>
        s.codigo.toLowerCase().includes(skuBusqueda.toLowerCase()) ||
        s.descripcion.toLowerCase().includes(skuBusqueda.toLowerCase())
      ).slice(0, 30);

      const misSolicitudes = solicitudes
        .filter(s => s.empleado && s.empleado.startsWith(empleadoNum + ' '))
        .slice(0, MAX_HISTORIAL);

      const esDestinoExterno = destino.toUpperCase().includes('PROCESO EXTERNO');

      // ============ LOADING ============
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex items-center gap-2 text-slate-600">
              <IconRefresh className="animate-spin" /> Cargando...
            </div>
          </div>
        );
      }

      // ============ LOGIN ============
      if (pantalla === 'login') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
              <div className="flex items-center justify-center mb-6">
                <div className="bg-slate-800 text-white rounded-xl p-3 mr-3"><IconPackage size={32} /></div>
                <div>
                  <h1 className="text-2xl font-bold text-slate-800">MAKEN METAL</h1>
                  <p className="text-sm text-slate-500">Transferencias</p>
                </div>
              </div>
              <label className="block text-base font-medium text-slate-700 mb-2">Número de empleado</label>
              <input type="tel" inputMode="numeric" pattern="[0-9]*" value={empleadoInput}
                onChange={(e) => setEmpleadoInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                placeholder="Ej. 1234" autoFocus
                className="w-full px-4 py-4 border-2 border-slate-300 rounded-xl text-xl text-center mb-4" />
              <button onClick={handleLogin}
                className="w-full bg-slate-800 active:bg-slate-950 text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 text-lg">
                <IconLogIn size={22} /> Entrar
              </button>

              <div className="mt-4 flex items-center justify-between">
                <button onClick={sincronizarCatalogos} disabled={sincronizando}
                  className="flex items-center gap-2 text-sm text-slate-600 active:text-slate-900 px-3 py-2">
                  <IconRefresh size={16} className={sincronizando ? 'animate-spin' : ''} />
                  {sincronizando ? 'Sincronizando...' : 'Sincronizar catálogos'}
                </button>
                <div className={`flex items-center gap-1 text-xs ${catalogosOnline ? 'text-green-600' : 'text-slate-400'}`}>
                  {catalogosOnline ? <IconCloud size={14} /> : <IconCloudOff size={14} />}
                  {catalogosOnline ? 'Online' : 'Offline'}
                </div>
              </div>

              <button onClick={() => { setPinInput(''); setPantalla('admin_pin'); }}
                className="w-full mt-4 text-xs text-slate-400 py-2">
                Admin
              </button>
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      // ============ ADMIN PIN ============
      if (pantalla === 'admin_pin') {
        return (
          <div className="min-h-screen bg-slate-100 p-4 flex items-center justify-center">
            <div className="bg-white rounded-2xl shadow p-6 w-full max-w-md">
              <div className="flex items-center gap-2 mb-4">
                <button onClick={() => setPantalla('login')} className="p-2 -ml-2"><IconBack size={22} /></button>
                <h2 className="text-lg font-bold">Acceso administrador</h2>
              </div>
              <label className="block text-sm font-medium text-slate-700 mb-2">PIN</label>
              <input type="password" inputMode="numeric" value={pinInput}
                onChange={(e) => setPinInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter') {
                    if (pinInput === PIN_ADMIN) { setPinInput(''); setPantalla('config'); }
                    else mostrarMensaje('PIN incorrecto', 'error');
                  }
                }}
                placeholder="••••" autoFocus
                className="w-full px-4 py-4 border-2 border-slate-300 rounded-xl text-xl text-center tracking-widest mb-4" />
              <button onClick={() => {
                if (pinInput === PIN_ADMIN) { setPinInput(''); setPantalla('config'); }
                else mostrarMensaje('PIN incorrecto', 'error');
              }}
                className="w-full bg-slate-800 active:bg-slate-950 text-white font-semibold py-4 rounded-xl">
                Entrar
              </button>
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      // ============ CONFIG (solo admin) ============
      if (pantalla === 'config') {
        return (
          <div className="min-h-screen bg-slate-100 p-4">
            <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow p-6">
              <div className="flex items-center gap-2 mb-6">
                <button onClick={() => setPantalla('login')} className="p-2 -ml-2"><IconBack size={22} /></button>
                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><IconSettings size={22} /> Configuración</h2>
              </div>
              <label className="block text-sm font-medium text-slate-700 mb-2">URL de Google Apps Script</label>
              <input type="text" value={configUrl} onChange={(e) => setConfigUrl(e.target.value)}
                placeholder="https://script.google.com/..."
                className="w-full px-4 py-3 border-2 border-slate-300 rounded-xl text-sm" />
              <div className="mt-3 flex gap-2 flex-wrap">
                <button onClick={async () => {
                  storage.set('config_url', configUrl);
                  mostrarMensaje('URL guardada', 'ok');
                  await cargarCatalogosDelSheet(configUrl);
                }} className="bg-slate-800 active:bg-slate-950 text-white px-5 py-3 rounded-xl font-medium">
                  Guardar URL
                </button>
                <button onClick={sincronizarCatalogos} disabled={sincronizando}
                  className="border-2 border-slate-300 text-slate-700 px-5 py-3 rounded-xl flex items-center gap-2 font-medium">
                  <IconRefresh size={16} className={sincronizando ? 'animate-spin' : ''} /> Sincronizar
                </button>
              </div>

              <div className={`mt-4 p-3 rounded-xl border-2 flex items-center gap-2 text-sm ${catalogosOnline ? 'bg-green-50 border-green-200 text-green-800' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                {catalogosOnline ? <IconCloud size={16} /> : <IconCloudOff size={16} />}
                {catalogosOnline ? 'Conectado a Google Sheets' : 'Sin conexión'}
              </div>

              <div className="mt-4">
                <h3 className="font-semibold text-slate-700 mb-2">Datos cargados</h3>
                <div className="text-sm text-slate-600 grid grid-cols-2 gap-2">
                  <div>Empleados: {empleados.length}</div>
                  <div>Nº parte: {skus.length}</div>
                  <div>Proveedores: {proveedores.length}</div>
                  <div>Almacenes: {almacenes.length}</div>
                  <div className="col-span-2">Solicitudes locales: {solicitudes.length}</div>
                </div>
              </div>
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      // ============ MODAL SELECCIÓN ALMACÉN ============
      if (modalAlmacen) {
        return (
          <div className="min-h-screen bg-white">
            <div className="bg-slate-800 text-white p-4 flex items-center gap-3 sticky top-0 z-10">
              <button onClick={() => setModalAlmacen(null)} className="p-2 -ml-2"><IconBack size={22} /></button>
              <h2 className="text-lg font-semibold">
                Almacén {modalAlmacen === 'origen' ? 'ORIGEN' : 'DESTINO'}
              </h2>
            </div>
            <div className="p-2">
              {almacenes.map((a, i) => {
                const disabled = modalAlmacen === 'destino' && a === origen;
                return (
                  <button key={i}
                    disabled={disabled}
                    onClick={() => {
                      if (modalAlmacen === 'origen') setOrigen(a); else setDestino(a);
                      setModalAlmacen(null);
                    }}
                    className={`w-full text-left p-5 my-2 rounded-xl border-2 text-lg font-medium ${
                      disabled ? 'bg-slate-100 text-slate-300 border-slate-100' :
                      (modalAlmacen === 'origen' ? origen : destino) === a
                        ? 'bg-slate-800 text-white border-slate-800'
                        : 'bg-white border-slate-200 active:bg-slate-100'
                    }`}>
                    {a}
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      // ============ PANTALLA BUSCAR SKU ============
      if (pantalla === 'buscar_sku') {
        return (
          <div className="min-h-screen bg-slate-50">
            <div className="bg-slate-800 text-white p-4 flex items-center gap-3 sticky top-0 z-10">
              <button onClick={() => { limpiarPartidaActual(); setPantalla('solicitud'); }} className="p-2 -ml-2">
                <IconBack size={22} />
              </button>
              <h2 className="text-lg font-semibold">Agregar partida</h2>
            </div>

            <div className="p-4">
              {!skuSeleccionado ? (
                <>
                  <div className="relative mb-3">
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><IconSearch /></div>
                    <input type="text" value={skuBusqueda} onChange={(e) => setSkuBusqueda(e.target.value)}
                      placeholder="Buscar por código o descripción..." autoFocus
                      className="w-full pl-12 pr-4 py-4 border-2 border-slate-300 rounded-xl text-base" />
                  </div>
                  <div className="space-y-2">
                    {skuBusqueda && skusFiltrados.length === 0 && (
                      <div className="p-4 text-center text-slate-500">Sin resultados</div>
                    )}
                    {skusFiltrados.map((s, i) => (
                      <button key={i} onClick={() => setSkuSeleccionado(s)}
                        className="w-full text-left p-4 bg-white border-2 border-slate-200 active:bg-slate-100 rounded-xl">
                        <div className="font-semibold text-base text-slate-800">{s.codigo}</div>
                        <div className="text-sm text-slate-600 mt-1">{s.descripcion}</div>
                      </button>
                    ))}
                    {!skuBusqueda && (
                      <div className="text-center text-slate-400 py-12">
                        Escribe para buscar ({skus.length} disponibles)
                      </div>
                    )}
                  </div>
                </>
              ) : (
                <>
                  <div className="p-4 bg-slate-800 text-white rounded-xl mb-4">
                    <div className="font-bold text-lg">{skuSeleccionado.codigo}</div>
                    <div className="text-sm text-slate-300 mt-1">{skuSeleccionado.descripcion}</div>
                    <button onClick={() => setSkuSeleccionado(null)}
                      className="mt-3 text-xs px-3 py-1 border border-slate-600 rounded">Cambiar</button>
                  </div>

                  <label className="block text-base font-medium text-slate-700 mb-2">Cantidad a mover</label>
                  <input type="number" inputMode="decimal" step="0.01" min="0"
                    value={cantidadPartida} onChange={(e) => setCantidadPartida(e.target.value)}
                    placeholder="0" autoFocus
                    className="w-full px-4 py-4 border-2 border-slate-300 rounded-xl text-xl mb-4" />

                  <label className="block text-base font-medium text-slate-700 mb-2">Saldo en origen después</label>
                  <input type="number" inputMode="decimal" step="0.01" min="0"
                    value={saldoPartida} onChange={(e) => setSaldoPartida(e.target.value)}
                    placeholder="0"
                    className="w-full px-4 py-4 border-2 border-slate-300 rounded-xl text-xl mb-2" />
                  <div className="text-xs text-slate-500 mb-4">Cuánto queda físicamente después de mover</div>

                  <button onClick={agregarPartida}
                    className="w-full bg-green-600 active:bg-green-800 text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 text-lg">
                    <IconPlus size={22} /> Agregar a la solicitud
                  </button>
                </>
              )}
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      // ============ APP PRINCIPAL ============
      return (
        <div className="min-h-screen bg-slate-100 pb-24">
          <div className="bg-slate-800 text-white shadow-lg sticky top-0 z-10">
            <div className="px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2 min-w-0">
                <IconPackage size={22} />
                <div className="min-w-0">
                  <div className="font-bold text-sm">MAKEN METAL</div>
                  <div className="text-xs text-slate-300 truncate">{empleadoNum} · {empleadoNombre}</div>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <div className={`flex items-center gap-1 text-xs px-2 py-1 rounded ${catalogosOnline ? 'bg-green-700' : 'bg-slate-600'}`}>
                  {catalogosOnline ? <IconCloud size={12} /> : <IconCloudOff size={12} />}
                  {catalogosOnline ? 'Online' : 'Offline'}
                </div>
                <button onClick={handleLogout} className="p-2 active:bg-slate-700 rounded"><IconLogOut size={20} /></button>
              </div>
            </div>
            <div className="px-2 flex gap-1">
              <button onClick={() => setPantalla('solicitud')}
                className={`flex-1 px-3 py-3 text-sm font-medium rounded-t-lg ${pantalla === 'solicitud' ? 'bg-slate-100 text-slate-800' : 'text-slate-300 active:bg-slate-700'}`}>
                Nueva solicitud
              </button>
              <button onClick={() => setPantalla('mis_solicitudes')}
                className={`flex-1 px-3 py-3 text-sm font-medium rounded-t-lg ${pantalla === 'mis_solicitudes' ? 'bg-slate-100 text-slate-800' : 'text-slate-300 active:bg-slate-700'}`}>
                Mis solicitudes ({misSolicitudes.length})
              </button>
            </div>
          </div>

          <div className="max-w-2xl mx-auto p-4">
            {pantalla === 'solicitud' && (
              <div className="space-y-4">
                {/* ORIGEN */}
                <button onClick={() => setModalAlmacen('origen')}
                  className="w-full text-left bg-white border-2 border-slate-200 active:bg-slate-100 rounded-xl p-4">
                  <div className="text-xs font-semibold text-slate-500 uppercase mb-1">1. Almacén origen</div>
                  <div className={`text-base font-medium ${origen ? 'text-slate-900' : 'text-slate-400'}`}>
                    {origen || 'Tocar para seleccionar'}
                  </div>
                </button>

                {/* DESTINO */}
                <button onClick={() => setModalAlmacen('destino')}
                  className="w-full text-left bg-white border-2 border-slate-200 active:bg-slate-100 rounded-xl p-4">
                  <div className="text-xs font-semibold text-slate-500 uppercase mb-1">2. Almacén destino</div>
                  <div className={`text-base font-medium ${destino ? 'text-slate-900' : 'text-slate-400'}`}>
                    {destino || 'Tocar para seleccionar'}
                  </div>
                </button>

                {/* PROVEEDOR */}
                {esDestinoExterno && (
                  <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-4">
                    <div className="text-xs font-semibold text-amber-900 uppercase mb-2">Proveedor externo</div>
                    <select value={proveedorSel} onChange={(e) => setProveedorSel(e.target.value)}
                      className="w-full px-3 py-3 border-2 border-amber-300 rounded-xl text-base bg-white">
                      <option value="">Seleccionar...</option>
                      {proveedores.map((p, i) => <option key={i} value={p}>{p}</option>)}
                      <option value="__otro__">+ Otro (capturar)</option>
                    </select>
                    {proveedorSel === '__otro__' && (
                      <input type="text" value={proveedorLibre} onChange={(e) => setProveedorLibre(e.target.value)}
                        placeholder="Nombre del proveedor"
                        className="w-full mt-2 px-3 py-3 border-2 border-amber-300 rounded-xl" />
                    )}
                  </div>
                )}

                {/* URGENCIA */}
                <div className="bg-white border-2 border-slate-200 rounded-xl p-4">
                  <div className="text-xs font-semibold text-slate-500 uppercase mb-3">3. Urgencia</div>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={() => setUrgencia('NORMAL')}
                      className={`py-4 rounded-xl font-semibold border-2 flex items-center justify-center gap-2 ${
                        urgencia === 'NORMAL' ? 'bg-green-600 text-white border-green-600' : 'bg-white text-slate-700 border-slate-200'
                      }`}>
                      <IconClock size={18} /> Normal
                    </button>
                    <button onClick={() => setUrgencia('URGENTE')}
                      className={`py-4 rounded-xl font-semibold border-2 flex items-center justify-center gap-2 ${
                        urgencia === 'URGENTE' ? 'bg-red-600 text-white border-red-600' : 'bg-white text-slate-700 border-slate-200'
                      }`}>
                      <IconFlame size={18} /> Urgente
                    </button>
                  </div>
                  {urgencia === 'URGENTE' && (
                    <div className="text-xs text-red-700 mt-2">🔴 Se notificará a oficinas por correo para atención inmediata</div>
                  )}
                </div>

                {/* PARTIDAS */}
                <div className="bg-white border-2 border-slate-200 rounded-xl p-4">
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-xs font-semibold text-slate-500 uppercase">4. Partidas ({partidas.length})</div>
                    <button onClick={() => setPantalla('buscar_sku')}
                      className="bg-slate-800 active:bg-slate-950 text-white text-sm px-4 py-2 rounded-lg flex items-center gap-1 font-medium">
                      <IconPlus size={16} /> Agregar
                    </button>
                  </div>
                  {partidas.length === 0 ? (
                    <div className="text-center text-slate-400 py-6 text-sm">Aún no hay partidas agregadas</div>
                  ) : (
                    <div className="space-y-2">
                      {partidas.map((p, i) => (
                        <div key={i} className="border border-slate-200 rounded-lg p-3 flex items-start gap-2">
                          <div className="flex-1 min-w-0">
                            <div className="font-semibold text-sm text-slate-800">{p.codigo}</div>
                            <div className="text-xs text-slate-600 truncate">{p.descripcion}</div>
                            <div className="text-sm mt-1">
                              <span className="font-semibold">Cant: {p.cantidad}</span>
                              <span className="text-slate-500 ml-2">Queda: {p.saldoOrigen}</span>
                            </div>
                          </div>
                          <button onClick={() => eliminarPartida(i)} className="p-2 text-red-600 active:bg-red-50 rounded">
                            <IconTrash size={18} />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* COMENTARIOS */}
                <div className="bg-white border-2 border-slate-200 rounded-xl p-4">
                  <div className="text-xs font-semibold text-slate-500 uppercase mb-2">5. Comentarios (opcional)</div>
                  <textarea value={comentarios} onChange={(e) => setComentarios(e.target.value)} rows={3}
                    placeholder="Información adicional..."
                    className="w-full px-3 py-2 border-2 border-slate-200 rounded-xl resize-none" />
                </div>

                {/* ENVIAR */}
                <button onClick={handleEnviar} disabled={enviando || partidas.length === 0}
                  className={`w-full font-bold py-5 rounded-xl flex items-center justify-center gap-2 text-lg shadow-lg ${
                    urgencia === 'URGENTE'
                      ? 'bg-red-600 active:bg-red-800 disabled:bg-slate-400 text-white'
                      : 'bg-slate-800 active:bg-slate-950 disabled:bg-slate-400 text-white'
                  }`}>
                  {enviando ? <><IconRefresh className="animate-spin" /> Enviando...</> :
                    <><IconSend size={22} /> Enviar solicitud {urgencia === 'URGENTE' && '🔴'}</>}
                </button>

                <button onClick={limpiarFormulario}
                  className="w-full py-3 text-slate-600 active:text-slate-900 text-sm">
                  Limpiar formulario
                </button>
              </div>
            )}

            {pantalla === 'mis_solicitudes' && (
              <div>
                <div className="flex items-center justify-between mb-3 px-1">
                  <h2 className="text-lg font-bold text-slate-800">Últimas {MAX_HISTORIAL}</h2>
                  <button onClick={actualizarEstados} disabled={actualizandoEstados}
                    className="flex items-center gap-2 bg-white border-2 border-slate-200 active:bg-slate-100 text-slate-700 text-sm px-3 py-2 rounded-lg font-medium">
                    <IconRefresh size={16} className={actualizandoEstados ? 'animate-spin' : ''} />
                    Actualizar
                  </button>
                </div>

                {misSolicitudes.length === 0 ? (
                  <div className="text-center py-16 text-slate-400">
                    <IconPackage size={48} className="mx-auto mb-2 opacity-30" />
                    <p>No tienes solicitudes aún</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {misSolicitudes.map((s, i) => (
                      <div key={i} className={`bg-white rounded-xl p-4 border-2 ${
                        s.procesado ? 'border-green-300' : s.urgencia === 'URGENTE' ? 'border-red-300' : 'border-amber-200'
                      }`}>
                        <div className="flex items-start justify-between mb-2 gap-2">
                          <div>
                            <div className="font-bold text-slate-800">{s.folio}</div>
                            <div className="text-xs text-slate-500">{s.fechaHora}</div>
                          </div>
                          <div className="flex gap-1 flex-wrap justify-end">
                            {s.urgencia === 'URGENTE' && (
                              <div className="flex items-center gap-1 text-xs font-bold px-2 py-1 rounded bg-red-600 text-white">
                                <IconFlame size={12} /> URGENTE
                              </div>
                            )}
                            <div className={`flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded ${
                              s.procesado ? 'bg-green-600 text-white' : 'bg-amber-500 text-white'
                            }`}>
                              {s.procesado ? <><IconCheck size={12} /> Procesado</> : <><IconClock size={12} /> Pendiente</>}
                            </div>
                          </div>
                        </div>
                        <div className="text-sm space-y-1">
                          <div className="text-slate-700">
                            <span className="text-slate-500">Ruta:</span> {s.origen} → {s.destino}
                          </div>
                          {s.proveedorExterno && (
                            <div className="text-slate-700"><span className="text-slate-500">Proveedor:</span> {s.proveedorExterno}</div>
                          )}
                          <div className="pt-2 border-t border-slate-100">
                            <div className="text-xs font-semibold text-slate-500 uppercase mb-1">
                              {(s.partidas || []).length} partida(s)
                            </div>
                            {(s.partidas || []).map((p, j) => (
                              <div key={j} className="text-sm py-1">
                                <span className="font-medium">{p.codigo}</span>
                                <span className="text-slate-500"> · Cant {p.cantidad} · Queda {p.saldoOrigen}</span>
                              </div>
                            ))}
                          </div>
                          {s.comentarios && <div className="text-slate-600 italic text-xs mt-2">"{s.comentarios}"</div>}
                          {s.procesado && s.fechaProcesado && (
                            <div className="text-green-700 text-xs mt-1">Procesado: {s.fechaProcesado}</div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
          {mensaje && <Notificacion mensaje={mensaje} />}
        </div>
      );
    }

    function Notificacion({ mensaje }) {
      const colores = { ok: 'bg-green-600', error: 'bg-red-600', warn: 'bg-amber-600' };
      const iconos = { ok: <IconCheck size={18} />, error: <IconAlert size={18} />, warn: <IconAlert size={18} /> };
      return (
        <div className={`fixed bottom-4 left-4 right-4 ${colores[mensaje.tipo]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 z-50 max-w-md mx-auto`}>
          {iconos[mensaje.tipo]}
          <span className="text-sm font-medium">{mensaje.texto}</span>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
