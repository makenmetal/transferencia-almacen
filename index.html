<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e293b" />
  <title>MAKEN METAL - Transferencias</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    const ALMACENES_DEFAULT = [
      '01 MATERIA PRIMA',
      '02 PROCESO DE MAQUINADO',
      '03 PROCESO EXTERNO',
      '04 PROCESO DE ACABADO',
      '05 EMSAMBLES',
      '06 PRODUCTO TERMINADO',
      '10 SCRAP',
    ];

    const SKUS_DEMO = [
      { codigo: 'MP-001', descripcion: 'Placa acero A36 1/4" x 4x8' },
      { codigo: 'MP-002', descripcion: 'Perfil PTR 2x2 cal 14 x 6m' },
    ];

    const PROVEEDORES_DEMO = ['Galvanizados del Norte'];
    const EMPLEADOS_DEMO = [{ numero: '1234', nombre: 'Demo' }];

    // Iconos inline SVG (sin librería externa)
    const Icon = ({ d, size = 18, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d}
      </svg>
    );
    const IconPackage = (p) => <Icon {...p} d={<><path d="M16.5 9.4 7.55 4.24"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></>} />;
    const IconSend = (p) => <Icon {...p} d={<><path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/><path d="m21.854 2.147-10.94 10.939"/></>} />;
    const IconLogIn = (p) => <Icon {...p} d={<><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></>} />;
    const IconLogOut = (p) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></>} />;
    const IconSettings = (p) => <Icon {...p} d={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />;
    const IconRefresh = (p) => <Icon {...p} d={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>} />;
    const IconCheck = (p) => <Icon {...p} d={<><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></>} />;
    const IconClock = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
    const IconAlert = (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>} />;
    const IconCloud = (p) => <Icon {...p} d={<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 0 1 0 9Z"/>} />;
    const IconCloudOff = (p) => <Icon {...p} d={<><path d="m2 2 20 20"/><path d="M5.782 5.782A7 7 0 0 0 9 19h8.5a4.5 4.5 0 0 0 1.307-.193"/><path d="M21.532 16.5A4.5 4.5 0 0 0 17.5 10h-1.79A7.008 7.008 0 0 0 10 5.07"/></>} />;
    const IconFile = (p) => <Icon {...p} d={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8M8 17h8M8 9h2"/></>} />;

    // Storage helpers usando localStorage
    const storage = {
      get: (key) => {
        try { return localStorage.getItem('mkm_' + key); } catch (e) { return null; }
      },
      set: (key, val) => {
        try { localStorage.setItem('mkm_' + key, val); return true; } catch (e) { return false; }
      },
    };

    function App() {
      const [pantalla, setPantalla] = useState('login');
      const [empleadoNum, setEmpleadoNum] = useState('');
      const [empleadoNombre, setEmpleadoNombre] = useState('');
      const [empleadoInput, setEmpleadoInput] = useState('');

      const [solicitudes, setSolicitudes] = useState([]);
      const [skus, setSkus] = useState(SKUS_DEMO);
      const [almacenes, setAlmacenes] = useState(ALMACENES_DEFAULT);
      const [proveedores, setProveedores] = useState(PROVEEDORES_DEMO);
      const [empleados, setEmpleados] = useState(EMPLEADOS_DEMO);

      const [configUrl, setConfigUrl] = useState('');
      const [catalogosOnline, setCatalogosOnline] = useState(false);
      const [loading, setLoading] = useState(true);
      const [sincronizando, setSincronizando] = useState(false);
      const [mensaje, setMensaje] = useState(null);

      const [origen, setOrigen] = useState('');
      const [destino, setDestino] = useState('');
      const [proveedorSel, setProveedorSel] = useState('');
      const [proveedorLibre, setProveedorLibre] = useState('');
      const [skuBusqueda, setSkuBusqueda] = useState('');
      const [skuSeleccionado, setSkuSeleccionado] = useState(null);
      const [cantidad, setCantidad] = useState('');
      const [saldoOrigen, setSaldoOrigen] = useState('');
      const [comentarios, setComentarios] = useState('');
      const [enviando, setEnviando] = useState(false);

      useEffect(() => { inicializar(); }, []);

      const inicializar = async () => {
        setLoading(true);
        const url = storage.get('config_url') || '';
        setConfigUrl(url);

        const sol = storage.get('solicitudes');
        if (sol) { try { setSolicitudes(JSON.parse(sol)); } catch (e) {} }

        if (url) await cargarCatalogosDelSheet(url);
        setLoading(false);
      };

      const cargarCatalogosDelSheet = async (url) => {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error('No se pudo leer Sheet');
          const data = await res.json();

          if (data.empleados?.length) {
            const m = data.empleados.filter(e => e.Numero).map(e => ({
              numero: String(e.Numero).trim(), nombre: String(e.Nombre || '').trim()
            }));
            if (m.length) setEmpleados(m);
          }
          if (data.numerosParte?.length) {
            const m = data.numerosParte.filter(s => s.Codigo).map(s => ({
              codigo: String(s.Codigo).trim(), descripcion: String(s.Descripcion || '').trim()
            }));
            if (m.length) setSkus(m);
          }
          if (data.proveedores?.length) {
            const m = data.proveedores.filter(p => p.Nombre).map(p => String(p.Nombre).trim());
            if (m.length) setProveedores(m);
          }
          if (data.almacenes?.length) {
            const m = data.almacenes.filter(a => a.Almacen).map(a => String(a.Almacen).trim());
            if (m.length) setAlmacenes(m);
          }
          setCatalogosOnline(true);
          return true;
        } catch (err) {
          setCatalogosOnline(false);
          return false;
        }
      };

      const sincronizarCatalogos = async () => {
        if (!configUrl) { mostrarMensaje('Configura la URL primero', 'error'); return; }
        setSincronizando(true);
        const ok = await cargarCatalogosDelSheet(configUrl);
        setSincronizando(false);
        mostrarMensaje(ok ? '✓ Catálogos actualizados' : 'No se pudo conectar', ok ? 'ok' : 'error');
      };

      const mostrarMensaje = (texto, tipo = 'ok') => {
        setMensaje({ texto, tipo });
        setTimeout(() => setMensaje(null), 3500);
      };

      const handleLogin = () => {
        const num = empleadoInput.trim();
        if (!num) return mostrarMensaje('Ingresa tu número de empleado', 'error');
        const emp = empleados.find(e => e.numero === num);
        if (!emp) return mostrarMensaje('Número de empleado no registrado. Pide a oficinas que te agreguen.', 'error');
        setEmpleadoNum(emp.numero);
        setEmpleadoNombre(emp.nombre);
        setPantalla('solicitud');
      };

      const handleLogout = () => {
        setEmpleadoNum(''); setEmpleadoNombre(''); setEmpleadoInput('');
        setPantalla('login'); limpiarFormulario();
      };

      const limpiarFormulario = () => {
        setOrigen(''); setDestino(''); setProveedorSel(''); setProveedorLibre('');
        setSkuBusqueda(''); setSkuSeleccionado(null); setCantidad('');
        setSaldoOrigen(''); setComentarios('');
      };

      const generarFolio = () => {
        const year = new Date().getFullYear();
        return `SOL-${year}-${String(solicitudes.length + 1).padStart(4, '0')}`;
      };

      const handleEnviar = async () => {
        if (!origen) return mostrarMensaje('Selecciona almacén origen', 'error');
        if (!destino) return mostrarMensaje('Selecciona almacén destino', 'error');
        if (origen === destino) return mostrarMensaje('Origen y destino no pueden ser iguales', 'error');
        const esExterno = destino.toUpperCase().includes('PROCESO EXTERNO');
        if (esExterno && !proveedorSel && !proveedorLibre) return mostrarMensaje('Selecciona o captura proveedor externo', 'error');
        if (!skuSeleccionado) return mostrarMensaje('Selecciona número de parte', 'error');
        if (!cantidad || parseFloat(cantidad) <= 0) return mostrarMensaje('Captura cantidad válida', 'error');
        if (saldoOrigen === '' || parseFloat(saldoOrigen) < 0) return mostrarMensaje('Captura saldo en origen', 'error');

        setEnviando(true);
        const ahora = new Date();
        const fechaStr = ahora.toLocaleDateString('es-MX');
        const horaStr = ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        const proveedorFinal = esExterno ? (proveedorSel === '__otro__' ? proveedorLibre : proveedorSel) : '';

        const nueva = {
          folio: generarFolio(),
          fechaHora: `${fechaStr} ${horaStr}`,
          timestamp: ahora.toISOString(),
          empleado: `${empleadoNum} - ${empleadoNombre}`,
          origen, destino,
          proveedorExterno: proveedorFinal,
          codigo: skuSeleccionado.codigo,
          descripcion: skuSeleccionado.descripcion,
          cantidad: parseFloat(cantidad),
          saldoOrigen: parseFloat(saldoOrigen),
          comentarios: comentarios.trim(),
          procesado: false,
        };

        const nuevas = [nueva, ...solicitudes];
        setSolicitudes(nuevas);
        storage.set('solicitudes', JSON.stringify(nuevas));

        if (configUrl) {
          try {
            await fetch(configUrl, {
              method: 'POST', mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(nueva),
            });
            mostrarMensaje(`✓ Solicitud ${nueva.folio} enviada`, 'ok');
          } catch (e) {
            mostrarMensaje(`Guardada localmente, error al enviar`, 'warn');
          }
        } else {
          mostrarMensaje(`Solicitud ${nueva.folio} guardada (offline)`, 'warn');
        }
        limpiarFormulario();
        setEnviando(false);
      };

      const skusFiltrados = skus.filter(s =>
        s.codigo.toLowerCase().includes(skuBusqueda.toLowerCase()) ||
        s.descripcion.toLowerCase().includes(skuBusqueda.toLowerCase())
      ).slice(0, 8);

      const misSolicitudes = solicitudes.filter(s => s.empleado && s.empleado.startsWith(empleadoNum + ' '));
      const esDestinoExterno = destino.toUpperCase().includes('PROCESO EXTERNO');

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex items-center gap-2 text-slate-600">
              <IconRefresh className="animate-spin" /> Cargando...
            </div>
          </div>
        );
      }

      if (pantalla === 'login') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center p-4">
            <div className="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
              <div className="flex items-center justify-center mb-6">
                <div className="bg-slate-800 text-white rounded-lg p-3 mr-3"><IconPackage size={32} /></div>
                <div>
                  <h1 className="text-2xl font-bold text-slate-800">MAKEN METAL</h1>
                  <p className="text-sm text-slate-500">Transferencias de Mercancía</p>
                </div>
              </div>
              <label className="block text-sm font-medium text-slate-700 mb-2">Número de empleado</label>
              <input type="text" value={empleadoInput} onChange={(e) => setEmpleadoInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                placeholder="Ej. 1234" autoFocus
                className="w-full px-4 py-3 border border-slate-300 rounded-lg text-lg mb-4" />
              <button onClick={handleLogin}
                className="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2">
                <IconLogIn size={20} /> Entrar
              </button>
              <div className="mt-4 flex items-center justify-between text-xs">
                <div className={`flex items-center gap-1 ${catalogosOnline ? 'text-green-600' : 'text-slate-400'}`}>
                  {catalogosOnline ? <IconCloud size={14} /> : <IconCloudOff size={14} />}
                  {catalogosOnline ? 'Catálogos sincronizados' : 'Modo offline'}
                </div>
                <button onClick={() => setPantalla('config')} className="text-slate-500 hover:text-slate-700 flex items-center gap-1">
                  <IconSettings size={14} /> Config
                </button>
              </div>
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      if (pantalla === 'config') {
        return (
          <div className="min-h-screen bg-slate-100 p-4">
            <div className="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><IconSettings size={22} /> Configuración</h2>
                <button onClick={() => setPantalla(empleadoNum ? 'solicitud' : 'login')} className="text-slate-500">Cerrar</button>
              </div>

              <label className="block text-sm font-medium text-slate-700 mb-2">URL de Google Apps Script</label>
              <input type="text" value={configUrl} onChange={(e) => setConfigUrl(e.target.value)}
                placeholder="https://script.google.com/macros/s/..../exec"
                className="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm" />
              <div className="mt-2 flex gap-2 flex-wrap">
                <button onClick={async () => {
                  storage.set('config_url', configUrl);
                  mostrarMensaje('URL guardada', 'ok');
                  await cargarCatalogosDelSheet(configUrl);
                }} className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">
                  Guardar URL
                </button>
                <button onClick={sincronizarCatalogos} disabled={sincronizando}
                  className="border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm flex items-center gap-1">
                  <IconRefresh size={14} className={sincronizando ? 'animate-spin' : ''} /> Sincronizar
                </button>
              </div>

              <div className={`mt-4 p-3 rounded-lg border flex items-center gap-2 text-sm ${catalogosOnline ? 'bg-green-50 border-green-200 text-green-800' : 'bg-slate-50 border-slate-200 text-slate-600'}`}>
                {catalogosOnline ? <IconCloud size={16} /> : <IconCloudOff size={16} />}
                {catalogosOnline ? 'Conectado a Google Sheets' : 'Sin conexión - usando datos demo'}
              </div>

              <div className="mt-4">
                <h3 className="font-semibold text-slate-700 mb-2">Datos cargados</h3>
                <div className="text-sm text-slate-600 grid grid-cols-2 gap-2">
                  <div>Empleados: {empleados.length}</div>
                  <div>Números de parte: {skus.length}</div>
                  <div>Proveedores: {proveedores.length}</div>
                  <div>Almacenes: {almacenes.length}</div>
                  <div className="col-span-2">Solicitudes locales: {solicitudes.length}</div>
                </div>
              </div>
            </div>
            {mensaje && <Notificacion mensaje={mensaje} />}
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-100">
          <div className="bg-slate-800 text-white shadow-lg">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <IconPackage size={24} />
                <div>
                  <div className="font-bold">MAKEN METAL</div>
                  <div className="text-xs text-slate-300">{empleadoNum} - {empleadoNombre}</div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <div className={`flex items-center gap-1 text-xs px-2 py-1 rounded ${catalogosOnline ? 'bg-green-700' : 'bg-slate-600'}`}>
                  {catalogosOnline ? <IconCloud size={12} /> : <IconCloudOff size={12} />}
                  {catalogosOnline ? 'Online' : 'Offline'}
                </div>
                <button onClick={() => setPantalla('config')} className="p-2 hover:bg-slate-700 rounded"><IconSettings size={18} /></button>
                <button onClick={handleLogout} className="p-2 hover:bg-slate-700 rounded"><IconLogOut size={18} /></button>
              </div>
            </div>
            <div className="max-w-4xl mx-auto px-4 flex gap-1">
              <button onClick={() => setPantalla('solicitud')}
                className={`px-4 py-2 text-sm font-medium rounded-t ${pantalla === 'solicitud' ? 'bg-slate-100 text-slate-800' : 'text-slate-300 hover:text-white'}`}>
                Nueva solicitud
              </button>
              <button onClick={() => setPantalla('mis_solicitudes')}
                className={`px-4 py-2 text-sm font-medium rounded-t ${pantalla === 'mis_solicitudes' ? 'bg-slate-100 text-slate-800' : 'text-slate-300 hover:text-white'}`}>
                Mis solicitudes ({misSolicitudes.length})
              </button>
            </div>
          </div>

          <div className="max-w-4xl mx-auto p-4">
            {pantalla === 'solicitud' && (
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-lg font-bold text-slate-800 mb-4">Solicitud de transferencia</h2>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">1. Almacén origen *</label>
                    <select value={origen} onChange={(e) => setOrigen(e.target.value)}
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg">
                      <option value="">Seleccionar...</option>
                      {almacenes.map((a, i) => <option key={i} value={a}>{a}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">2. Almacén destino *</label>
                    <select value={destino} onChange={(e) => setDestino(e.target.value)}
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg">
                      <option value="">Seleccionar...</option>
                      {almacenes.map((a, i) => <option key={i} value={a} disabled={a === origen}>{a}</option>)}
                    </select>
                  </div>
                </div>

                {esDestinoExterno && (
                  <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-lg">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Proveedor / maquilador externo *</label>
                    <select value={proveedorSel} onChange={(e) => setProveedorSel(e.target.value)}
                      className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-2">
                      <option value="">Seleccionar...</option>
                      {proveedores.map((p, i) => <option key={i} value={p}>{p}</option>)}
                      <option value="__otro__">+ Otro (capturar manualmente)</option>
                    </select>
                    {proveedorSel === '__otro__' && (
                      <input type="text" value={proveedorLibre} onChange={(e) => setProveedorLibre(e.target.value)}
                        placeholder="Nombre del proveedor externo"
                        className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                    )}
                  </div>
                )}

                <div className="mt-4">
                  <label className="block text-sm font-medium text-slate-700 mb-1">3. Número de parte *</label>
                  {skuSeleccionado ? (
                    <div className="flex items-center justify-between p-3 bg-slate-800 text-white rounded-lg">
                      <div>
                        <div className="font-semibold">{skuSeleccionado.codigo}</div>
                        <div className="text-sm text-slate-300">{skuSeleccionado.descripcion}</div>
                      </div>
                      <button onClick={() => { setSkuSeleccionado(null); setSkuBusqueda(''); }}
                        className="text-slate-300 text-sm px-3 py-1 border border-slate-600 rounded">Cambiar</button>
                    </div>
                  ) : (
                    <>
                      <input type="text" value={skuBusqueda} onChange={(e) => setSkuBusqueda(e.target.value)}
                        placeholder="Buscar por código o descripción..."
                        className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                      {skuBusqueda && (
                        <div className="mt-1 border border-slate-200 rounded-lg max-h-56 overflow-y-auto bg-white">
                          {skusFiltrados.length === 0 ? (
                            <div className="p-3 text-sm text-slate-500">Sin resultados</div>
                          ) : skusFiltrados.map((s, i) => (
                            <button key={i} onClick={() => { setSkuSeleccionado(s); setSkuBusqueda(''); }}
                              className="w-full text-left p-3 hover:bg-slate-100 border-b border-slate-100 last:border-0">
                              <div className="font-semibold text-sm">{s.codigo}</div>
                              <div className="text-xs text-slate-600">{s.descripcion}</div>
                            </button>
                          ))}
                        </div>
                      )}
                    </>
                  )}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">4. Cantidad a mover *</label>
                    <input type="number" step="0.01" min="0" value={cantidad} onChange={(e) => setCantidad(e.target.value)}
                      placeholder="0" className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">5. Saldo en origen después *</label>
                    <input type="number" step="0.01" min="0" value={saldoOrigen} onChange={(e) => setSaldoOrigen(e.target.value)}
                      placeholder="0" className="w-full px-3 py-2 border border-slate-300 rounded-lg" />
                    <div className="text-xs text-slate-500 mt-1">Cuánto queda físicamente después de mover</div>
                  </div>
                </div>

                <div className="mt-4">
                  <label className="block text-sm font-medium text-slate-700 mb-1">6. Comentarios</label>
                  <textarea value={comentarios} onChange={(e) => setComentarios(e.target.value)} rows={3}
                    placeholder="Información adicional (opcional)"
                    className="w-full px-3 py-2 border border-slate-300 rounded-lg resize-none" />
                </div>

                <div className="mt-6 flex gap-3">
                  <button onClick={handleEnviar} disabled={enviando}
                    className="flex-1 bg-slate-800 hover:bg-slate-900 disabled:bg-slate-400 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2">
                    {enviando ? <><IconRefresh className="animate-spin" /> Enviando...</> : <><IconSend /> Enviar solicitud</>}
                  </button>
                  <button onClick={limpiarFormulario}
                    className="px-6 py-3 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50">Limpiar</button>
                </div>
              </div>
            )}

            {pantalla === 'mis_solicitudes' && (
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-lg font-bold text-slate-800 mb-4">Mis solicitudes</h2>
                {misSolicitudes.length === 0 ? (
                  <div className="text-center py-12 text-slate-400">
                    <IconPackage size={40} className="mx-auto mb-2 opacity-30" />
                    <p>No tienes solicitudes aún</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {misSolicitudes.map((s, i) => (
                      <div key={i} className={`border rounded-lg p-4 ${s.procesado ? 'border-green-200 bg-green-50' : 'border-amber-200 bg-amber-50'}`}>
                        <div className="flex items-start justify-between mb-2">
                          <div>
                            <div className="font-bold text-slate-800">{s.folio}</div>
                            <div className="text-xs text-slate-500">{s.fechaHora}</div>
                          </div>
                          <div className={`flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded ${s.procesado ? 'bg-green-600 text-white' : 'bg-amber-500 text-white'}`}>
                            {s.procesado ? <><IconCheck size={12} /> Procesado</> : <><IconClock size={12} /> Pendiente</>}
                          </div>
                        </div>
                        <div className="text-sm space-y-1">
                          <div><span className="text-slate-500">Parte:</span> <span className="font-medium">{s.codigo}</span> — {s.descripcion}</div>
                          <div><span className="text-slate-500">Cantidad:</span> <span className="font-medium">{s.cantidad}</span> <span className="text-slate-400">(queda: {s.saldoOrigen})</span></div>
                          <div><span className="text-slate-500">Ruta:</span> {s.origen} → {s.destino}</div>
                          {s.proveedorExterno && <div><span className="text-slate-500">Proveedor:</span> {s.proveedorExterno}</div>}
                          {s.comentarios && <div className="text-slate-600 italic">"{s.comentarios}"</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
          {mensaje && <Notificacion mensaje={mensaje} />}
        </div>
      );
    }

    function Notificacion({ mensaje }) {
      const colores = { ok: 'bg-green-600', error: 'bg-red-600', warn: 'bg-amber-600' };
      const iconos = { ok: <IconCheck size={18} />, error: <IconAlert size={18} />, warn: <IconAlert size={18} /> };
      return (
        <div className={`fixed bottom-4 right-4 ${colores[mensaje.tipo]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 max-w-md z-50`}>
          {iconos[mensaje.tipo]}
          <span className="text-sm">{mensaje.texto}</span>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
